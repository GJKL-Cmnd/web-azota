<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Run Earn</title>

<style>
body {
  font-family: Arial;
  background: #f5f7fa;
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  border-radius: 15px;
  margin-bottom: 10px;
}

button {
  padding: 10px;
  border: none;
  border-radius: 10px;
  margin-top: 10px;
}

#start { background: green; color: white; }
#claim { background: orange; color: white; }
#withdraw { background: blue; color: white; }

/* notification giả */
#notify {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  background: black;
  color: white;
  padding: 10px;
  font-size: 14px;
}
</style>
</head>

<body>

<div id="notify">🏃 Chưa chạy</div>

<div class="card">
  💰 <b id="money">0</b> đ
  <button id="withdraw">Rút tiền</button>
</div>

<div class="card">
  📏 <b id="distance">0</b> m
</div>

<button id="start">Bắt đầu chạy</button>
<button id="claim" disabled>Nhận thưởng</button>

<!-- ADS -->
<div id="adBox" style="display:none;" class="card">
  📺 Quảng cáo: <span id="adTime">5</span>s  
  <br>
  <button onclick="skipAd()">Bỏ qua</button>
</div>

<!-- WITHDRAW -->
<div id="withdrawBox" style="display:none;" class="card">
  <select id="wallet">
    <option>Momo</option>
    <option>ZaloPay</option>
    <option>Bank</option>
  </select>

  <br><br>
  <input id="amount" placeholder="20000 - 50000" type="number"/>

  <button onclick="submitWithdraw()">Xác nhận</button>
</div>

<script>
// ===== STATE =====
let distance = 0;
let lastPos = null;
let canClaim = false;
let adsToday = parseInt(localStorage.getItem("ads") || 0);
let money = parseInt(localStorage.getItem("money") || 0);

// ===== UI =====
function updateUI() {
  document.getElementById("distance").innerText = Math.floor(distance);
  document.getElementById("money").innerText = money;
}

updateUI();

// ===== GPS =====
function startRun() {
  navigator.geolocation.watchPosition(pos => {
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    if (lastPos) {
      let d = calcDistance(lastPos.lat, lastPos.lon, lat, lon);
      distance += d;
    }

    lastPos = {lat, lon};

    document.getElementById("notify").innerText =
      "🏃 Đang chạy: " + Math.floor(distance) + " m";

    if (distance >= 1000 && !canClaim) {
      canClaim = true;
      document.getElementById("claim").disabled = false;
      alert("🎉 Đủ 1km!");
    }

    updateUI();

  }, err => {
    alert("Bật GPS lên!");
  });
}

// ===== DISTANCE =====
function calcDistance(lat1, lon1, lat2, lon2) {
  let R = 6371000;
  let dLat = (lat2-lat1) * Math.PI/180;
  let dLon = (lon2-lon1) * Math.PI/180;

  let a = Math.sin(dLat/2)**2 +
          Math.cos(lat1*Math.PI/180) *
          Math.cos(lat2*Math.PI/180) *
          Math.sin(dLon/2)**2;

  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// ===== START =====
document.getElementById("start").onclick = startRun;

// ===== CLAIM =====
document.getElementById("claim").onclick = () => {
  if (adsToday >= 20) {
    alert("Hết ads hôm nay");
    return;
  }

  showAd();
};

// ===== ADS =====
function showAd() {
  let box = document.getElementById("adBox");
  let time = 5;

  box.style.display = "block";
  document.getElementById("adTime").innerText = time;

  let t = setInterval(() => {
    time--;
    document.getElementById("adTime").innerText = time;

    if (time <= 0) {
      clearInterval(t);
      box.style.display = "none";
      reward(true);
    }
  }, 1000);
}

function skipAd() {
  document.getElementById("adBox").style.display = "none";
  alert("Không có thưởng");
}

// ===== REWARD =====
function reward(ok) {
  if (!ok) return;

  money += 100;
  adsToday++;

  localStorage.setItem("money", money);
  localStorage.setItem("ads", adsToday);

  distance = 0;
  canClaim = false;

  document.getElementById("claim").disabled = true;

  alert("+100đ");
  updateUI();
}

// ===== WITHDRAW =====
document.getElementById("withdraw").onclick = () => {
  document.getElementById("withdrawBox").style.display = "block";
};

function submitWithdraw() {
  let amount = parseInt(document.getElementById("amount").value);

  if (amount < 20000 || amount > 50000) {
    alert("20k - 50k");
    return;
  }

  if (money < amount) {
    alert("Không đủ tiền");
    return;
  }

  money -= amount;
  localStorage.setItem("money", money);

  alert("Đã gửi yêu cầu tới admin");

  document.getElementById("withdrawBox").style.display = "none";
  updateUI();
}
</script>

</body>
</html>
