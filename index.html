<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Azota Mini</title>

<style>
body {
  font-family: Arial;
  background: white;
  color: black;
  padding: 20px;
}

/* CREATE */
.question {
  border: 2px solid black;
  padding: 10px;
  margin-bottom: 15px;
}

input[type="text"] {
  width: 100%;
  margin: 5px 0;
  padding: 5px;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

/* RESULT */
#result {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

#score {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-size: 100px;
  font-weight: bold;
}

#fireworks {
  position: absolute;
  top: 0;
  left: 0;
}
</style>

</head>

<body>

<!-- TẠO ĐỀ -->
<div id="creator">
  <h2>Tạo đề</h2>
  <div id="questions"></div>
  <button onclick="addQuestion()">+ Thêm câu hỏi</button>
  <button onclick="createExam()">Tạo bài</button>
</div>

<!-- LÀM BÀI -->
<div id="exam" style="display:none;">
  <h2>Làm bài</h2>
  <div id="examContent"></div>
  <button onclick="submitExam()">Nộp bài</button>
</div>

<!-- KẾT QUẢ -->
<div id="result" style="display:none;">
  <div id="score"></div>
  <canvas id="fireworks"></canvas>
</div>

<script>
let questions = [];

// THÊM CÂU HỎI
function addQuestion() {
  const index = questions.length;

  const div = document.createElement("div");
  div.className = "question";

  div.innerHTML = `
    <input placeholder="Câu hỏi" onchange="update(${index}, 'q', this.value)">
    <input placeholder="Đáp án A" onchange="update(${index}, 'A', this.value)">
    <input placeholder="Đáp án B" onchange="update(${index}, 'B', this.value)">
    <input placeholder="Đáp án C" onchange="update(${index}, 'C', this.value)">
    <input placeholder="Đáp án D" onchange="update(${index}, 'D', this.value)">
    
    Đáp án đúng:
    <label><input type="radio" name="correct${index}" onclick="update(${index}, 'correct', 'A')">A</label>
    <label><input type="radio" name="correct${index}" onclick="update(${index}, 'correct', 'B')">B</label>
    <label><input type="radio" name="correct${index}" onclick="update(${index}, 'correct', 'C')">C</label>
    <label><input type="radio" name="correct${index}" onclick="update(${index}, 'correct', 'D')">D</label>
  `;

  document.getElementById("questions").appendChild(div);

  questions.push({ q:"", A:"", B:"", C:"", D:"", correct:"" });
}

// UPDATE DATA
function update(i, key, value) {
  questions[i][key] = value;
}

// TẠO BÀI
function createExam() {
  localStorage.setItem("examData", JSON.stringify(questions));
  location.reload();
}

// LOAD
window.onload = function() {
  const data = localStorage.getItem("examData");
  if (data) {
    questions = JSON.parse(data);
    startExam();
  }
};

// BẮT ĐẦU LÀM BÀI
function startExam() {
  document.getElementById("creator").style.display = "none";
  document.getElementById("exam").style.display = "block";

  let html = "";

  questions.forEach((q, i) => {
    html += `
      <div class="question">
        <b>${i+1}. ${q.q}</b><br>
        <label><input type="radio" name="q${i}" value="A"> ${q.A}</label><br>
        <label><input type="radio" name="q${i}" value="B"> ${q.B}</label><br>
        <label><input type="radio" name="q${i}" value="C"> ${q.C}</label><br>
        <label><input type="radio" name="q${i}" value="D"> ${q.D}</label><br>
      </div>
    `;
  });

  document.getElementById("examContent").innerHTML = html;
}

// NỘP BÀI
function submitExam() {
  let score = 0;

  questions.forEach((q, i) => {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    if (selected && selected.value === q.correct) {
      score += 0.25;
    }
  });

  localStorage.removeItem("examData");

  document.getElementById("exam").style.display = "none";
  document.getElementById("result").style.display = "block";
  document.getElementById("score").innerText = score;

  startFireworks();
}

// FIREWORKS LOOP 2s
function startFireworks() {
  const canvas = document.getElementById("fireworks");
  const ctx = canvas.getContext("2d");

  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;

  let particles = [];

  function createFirework() {
    for (let i = 0; i < 120; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vx: (Math.random() - 0.5) * 8,
        vy: (Math.random() - 0.5) * 8,
        life: 100
      });
    }
  }

  function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.life--;

      ctx.fillRect(p.x, p.y, 3, 3);
    });

    particles = particles.filter(p => p.life > 0);

    requestAnimationFrame(animate);
  }

  setInterval(createFirework, 2000);

  animate();
}
</script>

</body>
</html>
