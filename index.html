<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Blog Ultimate Pro</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI";
  background: #f4f6f9;
  transition: 0.3s;
}

.dark {
  background: #1e1e1e;
  color: white;
}

header {
  background: linear-gradient(90deg,#4facfe,#00f2fe);
  padding: 20px;
  text-align: center;
  color: white;
  font-size: 26px;
}

.container {
  display: flex;
  max-width: 1200px;
  margin: 20px auto;
}

.sidebar {
  width: 250px;
  background: white;
  padding: 15px;
  border-radius: 10px;
  margin-right: 20px;
}

.dark .sidebar { background:#2c2c2c; }

.main { flex: 1; }

.post {
  background: white;
  margin-bottom: 20px;
  border-radius: 10px;
  overflow: hidden;
  cursor: pointer;
  transition: 0.3s;
}

.dark .post { background:#2c2c2c; }

.post:hover { transform: translateY(-5px); }

.post img {
  width: 100%;
  height: 200px;
  object-fit: cover;
}

.post-content { padding: 15px; }

.post-title { font-size: 20px; font-weight: bold; }

#viewer {
  display: none;
  background: white;
  padding: 20px;
  border-radius: 10px;
}

.dark #viewer { background:#2c2c2c; }

iframe { width:100%; height:300px; }

button {
  padding: 8px 12px;
  border: none;
  border-radius: 5px;
  background: #4facfe;
  color: white;
  cursor: pointer;
}

input, textarea {
  width: 100%;
  padding: 8px;
  margin: 5px 0;
}

.comment {
  border-bottom: 1px solid #ccc;
  padding: 5px;
}

#adminPanel {
  display: none;
  background: white;
  padding: 15px;
  margin-top: 20px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>🚀 Blog Ultimate</header>

<div class="container">

<div class="sidebar">
  <button onclick="toggleDark()">🌙 Dark</button><br><br>
  <button onclick="toggleAdmin()">🔐 Admin</button><br><br>
  <input placeholder="🔍 Tìm kiếm..." oninput="searchPost(this.value)">
  <p id="stats"></p>
</div>

<div class="main">

<div id="posts"></div>

<div id="viewer">
  <button onclick="back()">⬅ Quay lại</button>
  <h2 id="title"></h2>
  <p id="date"></p>
  <p id="content"></p>
  <div id="video"></div>

  <p>❤️ <span id="likeCount"></span></p>
  <button onclick="likePost()">Like</button>

  <h3>Bình luận</h3>
  <div id="comments"></div>
  <input id="commentInput">
  <button onclick="addComment()">Gửi</button>
</div>

<div id="adminPanel">
  <h3>Thêm bài</h3>
  <input id="titleInput" placeholder="Tiêu đề">
  <textarea id="contentInput"></textarea>
  <input id="imgInput" placeholder="Link ảnh">
  <input id="videoInput" placeholder="YouTube">
  <button onclick="addPost()">Đăng</button>

  <h3>Quản lý</h3>
  <div id="adminList"></div>
</div>

</div>
</div>

<script>
let posts = JSON.parse(localStorage.getItem("posts")) || [];
let current = 0;

// RENDER
function render(list = posts){
  postsDiv.innerHTML="";
  list.forEach((p,i)=>{
    postsDiv.innerHTML += `
      <div class="post" onclick="view(${i})">
        <img src="${p.img || 'https://via.placeholder.com/800'}">
        <div class="post-content">
          <div class="post-title">${p.title}</div>
          <small>${p.date || ""}</small>
        </div>
      </div>
    `;
  });

  stats.innerText="Bài viết: "+posts.length;
  renderAdmin();
}

// VIEW
function view(i){
  current=i;
  postsDiv.style.display="none";
  viewer.style.display="block";

  let p=posts[i];
  title.innerText=p.title;
  content.innerText=p.content;
  date.innerText=p.date;
  likeCount.innerText=p.likes||0;

  renderComments();

  if(p.video){
    let id=p.video.split("v=")[1];
    video.innerHTML=`<iframe src="https://youtube.com/embed/${id}"></iframe>`;
  }
}

// BACK
function back(){
  postsDiv.style.display="block";
  viewer.style.display="none";
}

// ADD
function addPost(){
  posts.push({
    title:titleInput.value,
    content:contentInput.value,
    img:imgInput.value,
    video:videoInput.value,
    date:new Date().toLocaleDateString(),
    likes:0,
    comments:[]
  });

  localStorage.setItem("posts",JSON.stringify(posts));
  render();
}

// DELETE
function deletePost(i){
  posts.splice(i,1);
  localStorage.setItem("posts",JSON.stringify(posts));
  render();
}

// ADMIN LIST
function renderAdmin(){
  adminList.innerHTML="";
  posts.forEach((p,i)=>{
    adminList.innerHTML += `${p.title} <button onclick="deletePost(${i})">Xóa</button><br>`;
  });
}

// SEARCH
function searchPost(k){
  let r=posts.filter(p=>p.title.toLowerCase().includes(k.toLowerCase()));
  render(r);
}

// LIKE
function likePost(){
  posts[current].likes++;
  localStorage.setItem("posts",JSON.stringify(posts));
  view(current);
}

// COMMENT
function addComment(){
  if(!commentInput.value) return;
  posts[current].comments.push(commentInput.value);
  commentInput.value="";
  localStorage.setItem("posts",JSON.stringify(posts));
  renderComments();
}

function renderComments(){
  comments.innerHTML="";
  posts[current].comments.forEach(c=>{
    comments.innerHTML+=`<div class="comment">${c}</div>`;
  });
}

// DARK
function toggleDark(){
  document.body.classList.toggle("dark");
}

// ADMIN
function toggleAdmin(){
  let pass=prompt("Pass:");
  if(pass==="123") adminPanel.style.display="block";
}

// INIT
const postsDiv=document.getElementById("posts");
render();
</script>

</body>
  </html>
